<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🏷</span>
                <div class="title-col">
                    <h1>Barcode Generator</h1>
                    <p class="tagline">Generates printable standard UPC/EAN barcodes.</p>
                </div>
            </div>
            <div class="badge">media</div>
        </header>

        <main class="workspace-card">
            
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div style="display:flex; height:40px; width:150px; background:#fff; align-items:stretch;">
                    <div style="flex:1; border-right:4px solid #000; border-left:2px solid #000;"></div>
                    <div style="flex:1; border-right:2px solid #000; border-left:4px solid #000;"></div>
                    <div style="flex:1; border-right:3px solid #000; border-left:1px solid #000;"></div>
                </div>
                <div style="font-family:monospace; margin-top:6px; font-size:12px;">7890123456</div>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
